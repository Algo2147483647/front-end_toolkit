<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural 3D Highway Network Generator</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel" aria-label="Generator controls">
        <header class="brand-block">
          <p class="eyebrow">Procedural compiler</p>
          <h1>3D Highway Network Generator</h1>
        </header>

        <section class="panel-section">
          <div class="section-heading">
            <h2>Input Graph</h2>
            <select id="sampleSelect" aria-label="Example graph">
              <option value="stack4">4-way stack</option>
              <option value="turbine5">5-way urban hub</option>
              <option value="directional3">3-way directional T</option>
            </select>
          </div>
          <textarea id="graphInput" spellcheck="false" aria-label="Geographic graph JSON"></textarea>
          <div class="button-row">
            <button id="generateButton" class="primary-button" type="button">Generate</button>
            <button id="resetCameraButton" type="button">Reset View</button>
          </div>
        </section>

        <section class="panel-section compact">
          <h2>Design Controls</h2>
          <label>
            Portal distance
            <span><output id="portalDistanceValue"></output> m</span>
            <input id="portalDistance" type="range" min="160" max="620" step="20" />
          </label>
          <label>
            Layer height
            <span><output id="layerHeightValue"></output> m</span>
            <input id="layerHeight" type="range" min="6" max="14" step="0.5" />
          </label>
          <label>
            Ramp runout
            <span><output id="runoutValue"></output> m</span>
            <input id="runout" type="range" min="80" max="360" step="20" />
          </label>
          <label>
            Min radius
            <span><output id="minRadiusValue"></output> m</span>
            <input id="minRadius" type="range" min="80" max="300" step="10" />
          </label>
        </section>

        <section class="panel-section">
          <h2>Generated Stores</h2>
          <dl id="statsList" class="stats-list"></dl>
        </section>
      </aside>

      <section class="viewport-shell" aria-label="3D highway scene">
        <div id="sceneHost" class="scene-host"></div>
        <div class="scene-toolbar">
          <button id="toggleValidationButton" type="button" aria-pressed="true">Validation</button>
          <button id="toggleStructuresButton" type="button" aria-pressed="true">Structures</button>
          <button id="toggleLanesButton" type="button" aria-pressed="true">Lane Graph</button>
        </div>
        <div class="status-strip">
          <strong id="statusText">Waiting</strong>
          <span id="summaryText">Load a graph to synthesize interchanges, connectors, structures, and lane topology.</span>
        </div>
      </section>

      <aside class="inspector-panel" aria-label="Generated details">
        <section class="panel-section">
          <h2>Selected Connector</h2>
          <div id="selectionDetails" class="selection-details muted">Click a ramp in the 3D view.</div>
        </section>

        <section class="panel-section">
          <h2>Validation</h2>
          <ul id="validationList" class="issue-list"></ul>
        </section>

        <section class="panel-section grow">
          <h2>Movements</h2>
          <div id="movementList" class="movement-list"></div>
        </section>
      </aside>
    </main>

    <script id="debugState" type="application/json">{}</script>
    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
